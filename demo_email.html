<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Demo Email</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 12px 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { height: 28px; }

.ease {
  font-size: 16px;
  font-weight: 600;
  color: #7c3aed;
}

.tagline {
  font-size: 12px;
  color: #94a3b8;
}

/* ===== NAV ===== */
.nav {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  padding: 8px;
  background: rgba(15,23,42,0.6);
  border-radius: 10px;
}

.nav div {
  padding: 6px 12px;
  border-radius: 6px;
  color: #94a3b8;
  cursor: pointer;
}

.nav .active {
  color: white;
  background: rgba(59,130,246,0.15);
}

/* ===== MAIN CONTENT ===== */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}

.container {
  width: 100%;
  max-width: 720px;
}

/* ===== COMPOSE BOX ===== */
.compose-box {
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 25px;
}

/* TITLE */
.compose-title {
  font-size: 20px;
  margin-bottom: 20px;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 14px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: #e2e8f0;
  font-size: 14px;
}

textarea {
  min-height: 180px;
  resize: vertical;
}

/* BUTTON */
button {
  padding: 12px 22px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  color: white;
  cursor: pointer;
  font-weight: 500;
}

/* OUTPUT */
.output-box {
  margin-top: 20px;
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 20px;
  white-space: pre-wrap;
  font-size: 14px;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 10px;
  color: #94a3b8;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="brand">
    <img src="assets/logo.png" class="logo">
    <div>
      <div class="ease">EASE</div>
      <div class="tagline">Email Automation System Engine</div>
    </div>
  </div>

  <div class="nav">
    <div>Dashboard</div>
    <div>Tickets</div>
    <div class="active">Demo Email</div>
    <div>Reports</div>
    <div>Settings</div>
  </div>

</div>

<!-- MAIN -->
<div class="wrapper">

  <div class="container">

    <!-- COMPOSE -->
    <div class="compose-box">

      <div class="compose-title">Client’s Demo Email</div>

      <input id="name" placeholder="Client Name">
      <input id="email" placeholder="Client Email">
      <input id="subject" placeholder="Subject">
      <textarea id="message" placeholder="Type your email..."></textarea>

      <button onclick="sendMail()">Send</button>

      <div class="loader" id="loader">Processing...</div>

    </div>

    <!-- OUTPUT -->
    <div class="output-box" id="output">
Response will appear here...
    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwTJijz81CxBrY0_YrKH3dK5erasji0gHX6Kuo5rVFgS5u0lBMiNiV4AtGcdtSyUHCt/exec";

async function sendMail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  if (!email || !message){
    alert("Email and message required");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("output").innerText = "";

  // ✅ FIX: GET REQUEST (NO CORS ISSUE)
  const res = await fetch(
    `${API_URL}?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`
  );

  const data = await res.json();

  document.getElementById("loader").style.display = "none";

  document.getElementById("output").innerText =
`Ticket ID: ${data.ticketId}

${data.reply}`;

}

</script>

</body>
</html>
