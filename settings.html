<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Settings</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.layout { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 20px;
}

.sidebar h2 {
  color: #3b82f6;
  margin-bottom: 30px;
}

.nav-item {
  margin: 15px 0;
  color: #94a3b8;
  cursor: pointer;
}

.nav-item.active { color: white; }

.main { flex: 1; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { height: 28px; }

.brand-text { display: flex; flex-direction: column; }

.ease {
  font-size: 15px;
  font-weight: 600;
  color: #7c3aed;
}

.tagline {
  font-size: 11px;
  color: #94a3b8;
  white-space: nowrap;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-stats {
  text-align: right;
  font-size: 12px;
  color: #94a3b8;
}

.header-stats span {
  color: #3b82f6;
  font-weight: 600;
}

.user-badge {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(15,23,42,0.6);
  border: 1px solid #1e293b;
  font-size: 12px;
  color: #22c55e;
}

/* ===== NAV ===== */
.top-nav {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  padding: 8px;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(10px);
  border-radius: 10px;
}

.top-nav div {
  padding: 6px 12px;
  border-radius: 6px;
  color: #94a3b8;
  cursor: pointer;
}

.top-nav div.active {
  color: white;
  background: rgba(59,130,246,0.15);
}

/* ===== CONTENT ===== */
.grid {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== CARD ===== */
.settings-card {
  width: 100%;
  max-width: 520px;
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  margin-bottom: 20px;
}

/* SECTION */
.section-title {
  font-size: 14px;
  margin-bottom: 15px;
  color: #3b82f6;
}

/* INPUT */
.input-group {
  margin-bottom: 16px;
  width: 100%;
}

.input-group label {
  display: block;
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 6px;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: #e2e8f0;
  box-sizing: border-box;
}

/* BUTTON */
.save-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* ===== USER TABLE ===== */
.user-table {
  width: 100%;
  max-width: 900px;
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 15px;
}

.user-table table {
  width: 100%;
  border-collapse: collapse;
}

.user-table th,
.user-table td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  font-size: 12px;
  text-align: left; /* FIXED */
}

.user-table th {
  color: #3b82f6;
}

/* BLOCK */
.blocked {
  text-align: center;
  margin-top: 100px;
  color: #ef4444;
  font-size: 18px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  .sidebar { display: none; }
  .layout { flex-direction: column; }
  .grid { padding: 12px; }

  .top-nav {
    overflow-x: auto;
    white-space: nowrap;
  }

  .header { padding: 10px; }

  .logo { height: 22px; }
  .ease { font-size: 13px; }
  .tagline { font-size: 9px; }

  .header-stats { font-size: 10px; }

  .user-badge {
    font-size: 10px;
    padding: 4px 6px;
  }

}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>EASE</h2>
  <div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="nav-item" onclick="go('tickets.html')">Tickets</div>
  <div class="nav-item" onclick="go('reports.html')">Reports</div>
  <div class="nav-item active">Settings</div>
</div>

<div class="main">

<div class="header">
  <div class="header-top">
    <div class="brand-wrap">
      <img src="assets/logo.png" class="logo">
      <div class="brand-text">
        <div class="ease">EASE</div>
        <div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
      </div>
    </div>

    <div class="header-right">
      <div class="header-stats">
        Open <span>12</span><br>
        Closed <span>5</span>
      </div>

      <div class="user-badge">Admin</div>
    </div>
  </div>

  <div class="top-nav">
    <div onclick="go('dashboard.html')">Dashboard</div>
    <div onclick="go('tickets.html')">Tickets</div>
    <div onclick="go('reports.html')">Reports</div>
    <div class="active">Settings</div>
  </div>
</div>

<div class="grid" id="settingsContainer">

<div class="settings-card">

<div class="section-title">Profile Settings</div>

<div class="input-group">
<label>Master Email ID</label>
<input type="email" placeholder="example@domain.com">
</div>

<div class="input-group">
<label>Active Since</label>
<input type="date">
</div>

<hr style="border:1px solid #1e293b; margin:20px 0;">

<div class="section-title">User Management</div>

<div class="input-group">
<label>User Name</label>
<input type="text">
</div>

<div class="input-group">
<label>Role</label>
<select>
<option>User</option>
<option>Admin</option>
<option>Dev</option>
</select>
</div>

<div class="input-group">
<label>Location Assigned</label>
<input type="text">
</div>

<div class="input-group">
<label>Type</label>
<select>
<option>All</option>
<option>Documentation</option>
<option>Enquiry</option>
</select>
</div>

<div class="input-group">
<label>Mobile Number</label>
<input type="text">
</div>

<div class="input-group">
<label>Telegram ID</label>
<input type="text">
</div>

<button class="save-btn">Save / Update</button>

</div>

<!-- USERS TABLE -->
<div class="user-table">
<div class="section-title">Existing Users</div>

<table id="userTable">
<tr>
<th>User Name</th>
<th>Role</th>
<th>Location</th>
<th>Type</th>
</tr>

<tr>
<td contenteditable="true">user1</td>
<td contenteditable="true">User</td>
<td contenteditable="true">Kolkata</td>
<td contenteditable="true">All</td>
</tr>

<tr>
<td contenteditable="true">admin1</td>
<td contenteditable="true">Admin</td>
<td contenteditable="true">All</td>
<td contenteditable="true">All</td>
</tr>

</table>
</div>

</div>

</div>
</div>

<script>

function go(page){
  window.location.href = page;
}

/* ROLE CONTROL */
const USER_ROLE = "admin";

if(USER_ROLE !== "admin" && USER_ROLE !== "dev"){
  document.getElementById("settingsContainer").innerHTML =
    '<div class="blocked">Access Restricted</div>';
}

/* EDIT CONTROL */
if(USER_ROLE !== "admin" && USER_ROLE !== "dev"){
  document.querySelectorAll("#userTable td").forEach(cell=>{
    cell.contentEditable = "false";
    cell.style.opacity = "0.7";
  });
}

</script>

</body>
</html>
