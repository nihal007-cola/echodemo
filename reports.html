<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Reports</title>

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#020617; color:#e2e8f0;}
.layout{display:flex;}
.sidebar{width:220px;height:100vh;border-right:1px solid #1e293b;padding:20px;}
.sidebar h2{color:#3b82f6;}
.nav-item{margin:15px 0;color:#94a3b8;cursor:pointer;}
.nav-item.active{color:white;}
.main{flex:1;}

.header{position:sticky;top:0;background:#020617;border-bottom:1px solid #1e293b;padding:12px 16px;z-index:1000;}
.header-top{display:flex;justify-content:space-between;align-items:center;}
.brand-wrap{display:flex;align-items:center;gap:10px;}
.logo{height:28px;}
.ease{color:#7c3aed;font-weight:600;}
.tagline{font-size:11px;color:#94a3b8;white-space:nowrap;}
.header-right{display:flex;gap:15px;align-items:center;}
.user-badge{background:rgba(15,23,42,0.6);border:1px solid #1e293b;padding:6px 10px;border-radius:8px;color:#22c55e;font-size:12px;}

.top-nav{margin-top:10px;display:flex;gap:12px;padding:8px;background:rgba(15,23,42,0.6);border-radius:10px;}
.top-nav div{padding:6px 12px;color:#94a3b8;cursor:pointer;}
.top-nav .active{color:white;background:rgba(59,130,246,0.15);}

.grid{padding:20px;}

.module-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

.module-card{
  background:rgba(15,23,42,0.7);
  border:1px solid #1e293b;
  border-radius:12px;
  padding:25px;
  text-align:center;
  cursor:pointer;
}

.module-card.selected{border:1px solid #facc15;}
.module-card.loaded{
  background:rgba(59,130,246,0.25);
  border:1px solid #3b82f6;
  color:white;
}

.table-container{
  margin-top:20px;
  background:rgba(15,23,42,0.7);
  border-radius:12px;
  border:1px solid #1e293b;
  padding:15px;
  overflow-x:auto;
}

table{width:100%;border-collapse:collapse;min-width:700px;}
th,td{padding:10px;border-bottom:1px solid #1e293b;font-size:12px;text-align:left;}
th{color:#3b82f6;}

.print-btn{margin-top:10px;padding:8px;border-radius:6px;border:none;background:#3b82f6;color:white;}

@media(max-width:768px){
.sidebar{display:none;}
.layout{flex-direction:column;}
.grid{padding:12px;}
.module-grid{grid-template-columns:1fr;}
}

/* 🔥 LOADER */
.loader-overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(2,6,23,0.6);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
visibility:hidden;
transition:0.2s;
}
.loader-overlay.active{
opacity:1;
visibility:visible;
}

.loader-spinner{
width:50px;height:50px;
border:4px solid rgba(59,130,246,0.2);
border-top:4px solid #3b82f6;
border-radius:50%;
animation:spin 0.8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
<h2>EASE</h2>
<div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
<div class="nav-item" onclick="go('tickets.html')">Tickets</div>
<div class="nav-item active">Reports</div>
<div class="nav-item" onclick="go('settings.html')">Settings</div>
</div>

<div class="main">

<div class="header">
<div class="header-top">
<div class="brand-wrap">
<img src="assets/logo.png" class="logo">
<div>
<div class="ease">EASE</div>
<div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
</div>
</div>
<div class="header-right">
<div class="user-badge">Admin</div>
</div>
</div>

<div class="top-nav">
<div onclick="go('dashboard.html')">Dashboard</div>
<div onclick="go('tickets.html')">Tickets</div>
<div class="active">Reports</div>
<div onclick="go('settings.html')">Settings</div>
</div>
</div>

<div class="grid">

<div class="module-grid">
<div class="module-card" onclick="loadTable('tickets',this)">TICKETS</div>
<div class="module-card" onclick="loadTable('email',this)">EMAIL_LOG</div>
<div class="module-card" onclick="loadTable('docs',this)">DOCUMENT_TRACKER</div>
<div class="module-card" onclick="loadTable('keywords',this)">KEYWORD_ALERTS</div>
<div class="module-card" onclick="loadTable('users',this)">USERS</div>
</div>

<div class="table-container" id="tableArea"></div>

</div>
</div>
</div>

<!-- LOADER -->
<div id="loaderOverlay" class="loader-overlay">
<div class="loader-spinner"></div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwTJijz81CxBrY0_YrKH3dK5erasji0gHX6Kuo5rVFgS5u0lBMiNiV4AtGcdtSyUHCt/exec";
const ROLE="admin";
const CACHE={};

function showLoader(){
document.getElementById("loaderOverlay").classList.add("active");
}

function hideLoader(){
document.getElementById("loaderOverlay").classList.remove("active");
}

async function loadTable(type,el){

document.querySelectorAll(".module-card").forEach(c=>{
c.classList.remove("selected","loaded");
});
el.classList.add("selected");

if(type==="users" && ROLE!=="admin"){
alert("Access restricted");
return;
}

showLoader();

let data;
if(CACHE[type]){
data=CACHE[type];
}else{
const res=await fetch(`${API}?type=${type}`);
data=await res.json();
CACHE[type]=data;
}

if(!data || data.length===0){
document.getElementById("tableArea").innerHTML="No Data";
hideLoader();
return;
}

const headers=Object.keys(data[0]);

let html="<table><tr>";
for(let h of headers){ html+=`<th>${h}</th>`; }
html+="</tr>";

for(let row of data){
html+="<tr>";
for(let h of headers){
html+=`<td>${row[h]||""}</td>`;
}
html+="</tr>";
}

html+="</table><button class='print-btn' onclick='window.print()'>Print</button>";

document.getElementById("tableArea").innerHTML=html;

el.classList.remove("selected");
el.classList.add("loaded");

hideLoader();
}

function go(page){window.location.href=page;}

</script>

</body>
</html>
