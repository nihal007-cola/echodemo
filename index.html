<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE - Login</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.container { display: flex; min-height: 100vh; }

.left {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f172a, #020617);
}

.brand { text-align: center; }

.logo { width: 110px; margin-bottom: 10px; }

.ease {
  font-size: 36px;
  font-weight: bold;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle { font-size: 15px; color: #22c55e; margin-top: 6px; }
.tagline { font-size: 13px; color: #94a3b8; margin-top: 5px; }

.right {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 100%;
  max-width: 360px;
  padding: 25px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid #1e293b;
  border-radius: 12px;
}

.card h2 { text-align: center; margin-bottom: 20px; }

.input-group { margin-bottom: 15px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: #e2e8f0;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.switch {
  text-align: center;
  margin-top: 12px;
  font-size: 13px;
  color: #94a3b8;
  cursor: pointer;
}

.permission-box {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 15px;
  line-height: 1.5;
}

.oauth-btn {
  margin-bottom: 10px;
  background: #111827;
  border: 1px solid #1e293b;
}

@media (max-width: 768px) {
  .container { flex-direction: column; }
  .left, .right { width: 100%; }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <div class="brand">
    <img src="assets/logo.png" class="logo">
    <div class="ease">EASE</div>
    <div class="subtitle">Email Automation System Engine</div>
    <div class="tagline">Powered by Offices of Nawnit Nihal</div>
  </div>
</div>

<div class="right">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h2>Login</h2>
  <div class="input-group"><input type="text" placeholder="Username"></div>
  <div class="input-group"><input type="password" placeholder="Password"></div>
  <button onclick="login()">Login</button>
  <div class="switch" onclick="showRegister()">Create Account</div>
</div>

<!-- REGISTER STEP 1 -->
<div class="card" id="registerStep1" style="display:none;">
  <h2>Create Account</h2>
  <div class="input-group"><input type="email" placeholder="Email"></div>
  <div class="input-group"><input type="password" placeholder="Password"></div>
  <button onclick="nextStep()">Continue</button>
  <div class="switch" onclick="showLogin()">Back</div>
</div>

<!-- REGISTER STEP 2 -->
<div class="card" id="registerStep2" style="display:none;">
  <h2>Connect Email</h2>

  <div class="permission-box">
    ✔ Read emails<br>
    ✔ Send replies<br>
    ✔ Create tickets
  </div>

  <!-- OAUTH -->
  <button class="oauth-btn" onclick="connectGmail()">Connect Gmail</button>
  <button class="oauth-btn" onclick="connectOutlook()">Connect Outlook</button>

  <div class="switch" onclick="showIMAP()">Use IMAP instead</div>
</div>

<!-- IMAP FALLBACK -->
<div class="card" id="imapBox" style="display:none;">
  <h2>IMAP Setup</h2>

  <div class="input-group">
    <input id="imapEmail" placeholder="Email">
  </div>

  <div class="input-group">
    <input id="imapPass" type="password" placeholder="App Password">
  </div>

  <div class="input-group">
    <input id="imapServer" placeholder="IMAP Server">
  </div>

  <div class="input-group">
    <input id="smtpServer" placeholder="SMTP Server">
  </div>

  <button onclick="saveIMAP()">Connect</button>
</div>

</div>
</div>

<script>

// NAV
function showRegister(){
  loginBox.style.display="none";
  registerStep1.style.display="block";
}
function showLogin(){
  loginBox.style.display="block";
  registerStep1.style.display="none";
  registerStep2.style.display="none";
}
function nextStep(){
  registerStep1.style.display="none";
  registerStep2.style.display="block";
}
function showIMAP(){
  registerStep2.style.display="none";
  imapBox.style.display="block";
}

// LOGIN
function login(){
  window.location.href="dashboard.html";
}

// OAUTH
function connectGmail(){
  window.location.href="https://your-backend.com/auth/gmail";
}

function connectOutlook(){
  window.location.href="https://your-backend.com/auth/outlook";
}

// IMAP SAVE
function saveIMAP(){

  const data = {
    email: imapEmail.value,
    password: imapPass.value,
    imap: imapServer.value,
    smtp: smtpServer.value
  };

  fetch("https://your-backend.com/save-imap", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  })
  .then(()=> {
    alert("Email connected");
    window.location.href="dashboard.html";
  });

}

</script>

</body>
</html>
