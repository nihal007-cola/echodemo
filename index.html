<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE - Login</title>

<style>

/* ===== GLOBAL ===== */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

/* ===== LAYOUT ===== */
.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT */
.left {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #0f172a, #020617);
}

.brand { text-align: center; }

.logo {
  width: 110px;
  margin-bottom: 10px;
}

.ease {
  font-size: 36px;
  font-weight: bold;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 15px;
  color: #22c55e;
  margin-top: 6px;
}

.tagline {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 5px;
  white-space: nowrap;
}

/* RIGHT */
.right {
  width: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  width: 100%;
  max-width: 360px;
  padding: 25px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid #1e293b;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.card h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */
.input-group { margin-bottom: 15px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: #e2e8f0;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

/* SWITCH */
.switch {
  text-align: center;
  margin-top: 12px;
  font-size: 13px;
  color: #94a3b8;
  cursor: pointer;
}

/* PERMISSION */
.permission-box {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 15px;
  line-height: 1.5;
}

.permission-box strong { color: #e2e8f0; }

/* MOBILE */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .left {
    width: 100%;
    margin-bottom: 20px;
  }

  .right {
    width: 100%;
  }

  .logo { width: 90px; }
  .ease { font-size: 28px; }

}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="brand">
      <img src="assets/logo.png" class="logo">
      <div class="ease">EASE</div>
      <div class="subtitle">Email Automation System Engine</div>
      <div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- LOGIN -->
    <div class="card" id="loginBox">
      <h2>Login</h2>

      <div class="input-group">
        <input type="text" placeholder="Username">
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password">
      </div>

      <button onclick="login()">Login</button>

      <div class="switch" onclick="showRegister()">
        Create Account
      </div>
    </div>

    <!-- REGISTER STEP 1 -->
    <div class="card" id="registerStep1" style="display:none;">
      <h2>Create Account</h2>

      <div class="input-group">
        <input type="email" placeholder="Email">
      </div>

      <div class="input-group">
        <input type="password" placeholder="Password">
      </div>

      <button onclick="nextStep()">Continue</button>

      <div class="switch" onclick="showLogin()">
        Back to Login
      </div>
    </div>

    <!-- REGISTER STEP 2 -->
    <div class="card" id="registerStep2" style="display:none;">
      <h2>Email Access</h2>

      <div class="permission-box">
        EASE requires permission to:
        <br><br>
        ✔ <strong>Read incoming emails</strong><br>
        ✔ <strong>Send responses automatically</strong><br>
        ✔ <strong>Convert conversations into tickets</strong>
      </div>

      <button onclick="completeRegistration()">Allow & Continue</button>

      <div class="switch" onclick="showRegister()">
        Back
      </div>
    </div>

  </div>

</div>

<script>

function showRegister(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerStep1").style.display = "block";
  document.getElementById("registerStep2").style.display = "none";
}

function showLogin(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerStep1").style.display = "none";
  document.getElementById("registerStep2").style.display = "none";
}

function nextStep(){
  document.getElementById("registerStep1").style.display = "none";
  document.getElementById("registerStep2").style.display = "block";
}

function completeRegistration(){
  window.location.href = "dashboard.html";
}

function login(){
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
