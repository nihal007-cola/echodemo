<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Demo Email</title>

<style>

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:#e2e8f0;
}

.layout{display:flex;}

.sidebar{
  width:220px;
  height:100vh;
  border-right:1px solid #1e293b;
  padding:20px;
}

.sidebar h2{color:#3b82f6;}

.nav-item{margin:15px 0;color:#94a3b8;cursor:pointer;}
.nav-item.active{color:white;}

.main{flex:1;}

.header{
  position:sticky;
  top:0;
  background:#020617;
  border-bottom:1px solid #1e293b;
  padding:12px 16px;
  z-index:1000;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand-wrap{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{height:28px;}

.ease{color:#7c3aed;font-weight:600;}

.tagline{
  font-size:11px;
  color:#94a3b8;
  white-space:nowrap;
}

.top-nav{
  margin-top:10px;
  display:flex;
  gap:12px;
  padding:8px;
  background:rgba(15,23,42,0.6);
  border-radius:10px;
}

.top-nav div{
  padding:6px 12px;
  color:#94a3b8;
  cursor:pointer;
}

.top-nav .active{
  color:white;
  background:rgba(59,130,246,0.15);
}

/* ===== MAIN GRID ===== */
.grid{
  display:flex;
  justify-content:center;
  padding:30px 20px;
}

/* ===== COMPOSE BOX ===== */
.compose-box{
  width:100%;
  max-width:720px;
  background:rgba(15,23,42,0.7);
  border:1px solid #1e293b;
  border-radius:12px;
  padding:25px;
}

/* TITLE */
.compose-title{
  font-size:20px;
  margin-bottom:20px;
}

/* INPUT GROUP FIX (IMPORTANT) */
.input-group{
  width:100%;
}

/* INPUTS */
input, textarea{
  width:100%;
  box-sizing:border-box; /* 🔥 FIXES RIGHT OVERFLOW */
  padding:14px;
  margin-bottom:14px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:#e2e8f0;
  font-size:14px;
}

/* TEXTAREA FIX */
textarea{
  min-height:160px;
  resize:vertical;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#3b82f6,#7c3aed);
  color:white;
  cursor:pointer;
}

/* OUTPUT */
.output-box{
  margin-top:20px;
  max-width:720px;
  width:100%;
  background:rgba(15,23,42,0.7);
  border:1px solid #1e293b;
  border-radius:12px;
  padding:20px;
  white-space:pre-wrap;
}

/* MOBILE */
@media(max-width:768px){

  .sidebar{display:none;}
  .layout{flex-direction:column;}

  .grid{
    padding:15px;
  }

  .compose-box{
    padding:18px;
  }

  input, textarea{
    padding:12px;
  }

}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>EASE</h2>
  <div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="nav-item" onclick="go('tickets.html')">Tickets</div>
  <div class="nav-item active">Demo Email</div>
  <div class="nav-item" onclick="go('reports.html')">Reports</div>
  <div class="nav-item" onclick="go('settings.html')">Settings</div>
</div>

<div class="main">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand-wrap">
      <img src="assets/logo.png" class="logo">
      <div>
        <div class="ease">EASE</div>
        <div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
      </div>
    </div>
  </div>

  <div class="top-nav">
    <div onclick="go('dashboard.html')">Dashboard</div>
    <div onclick="go('tickets.html')">Tickets</div>
    <div class="active">Demo Email</div>
    <div onclick="go('reports.html')">Reports</div>
    <div onclick="go('settings.html')">Settings</div>
  </div>
</div>

<!-- CONTENT -->
<div class="grid">

  <div>
    <!-- COMPOSE -->
    <div class="compose-box">

      <div class="compose-title">Client’s Demo Email</div>

      <input id="name" placeholder="Client Name">
      <input id="email" placeholder="Client Email">
      <input id="subject" placeholder="Subject">
      <textarea id="message" placeholder="Type your email..."></textarea>

      <button onclick="sendMail()">Send</button>

    </div>

    <!-- OUTPUT -->
    <div class="output-box" id="output">
Response will appear here...
    </div>

  </div>

</div>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwTJijz81CxBrY0_YrKH3dK5erasji0gHX6Kuo5rVFgS5u0lBMiNiV4AtGcdtSyUHCt/exec";

function go(page){ window.location.href = page; }

async function sendMail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  if (!email || !message){
    alert("Email and message required");
    return;
  }

  document.getElementById("output").innerText = "Processing...";

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      subject,
      body: message
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
`Ticket ID: ${data.ticketId}

${data.reply}`;

}

</script>

</body>
</html>
