<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Demo Email</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.layout { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 20px;
}

.sidebar h2 {
  color: #3b82f6;
  margin-bottom: 30px;
}

.nav-item {
  margin: 15px 0;
  color: #94a3b8;
  cursor: pointer;
}

.nav-item.active { color: white; }

/* ===== MAIN ===== */
.main { flex: 1; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { height: 28px; }

.ease {
  font-size: 15px;
  font-weight: 600;
  color: #7c3aed;
}

.tagline {
  font-size: 11px;
  color: #94a3b8;
}

/* ===== NAV ===== */
.top-nav {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  padding: 8px;
  background: rgba(15,23,42,0.6);
  border-radius: 10px;
}

.top-nav div {
  padding: 6px 12px;
  border-radius: 6px;
  color: #94a3b8;
  cursor: pointer;
}

.top-nav div.active {
  color: white;
  background: rgba(59,130,246,0.15);
}

/* ===== CONTENT ===== */
.content {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* ===== COMPOSE BOX ===== */
.compose-box {
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 20px;
}

.compose-title {
  font-size: 18px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: #e2e8f0;
}

textarea {
  min-height: 120px;
}

/* ===== BUTTON ===== */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(90deg,#3b82f6,#7c3aed);
  color: white;
  cursor: pointer;
}

/* ===== OUTPUT ===== */
.output-box {
  margin-top: 20px;
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 20px;
  white-space: pre-wrap;
}

/* ===== LOADER ===== */
.loader {
  display: none;
  margin-top: 10px;
  color: #94a3b8;
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>EASE</h2>
  <div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="nav-item" onclick="go('tickets.html')">Tickets</div>
  <div class="nav-item active">Demo Email</div>
  <div class="nav-item" onclick="go('reports.html')">Reports</div>
  <div class="nav-item" onclick="go('settings.html')">Settings</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand-wrap">
      <img src="assets/logo.png" class="logo">
      <div>
        <div class="ease">EASE</div>
        <div class="tagline">Email Automation System Engine</div>
      </div>
    </div>
  </div>

  <div class="top-nav">
    <div onclick="go('dashboard.html')">Dashboard</div>
    <div onclick="go('tickets.html')">Tickets</div>
    <div class="active">Demo Email</div>
    <div onclick="go('reports.html')">Reports</div>
    <div onclick="go('settings.html')">Settings</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<div class="compose-box">
  <div class="compose-title">Compose Demo Email</div>

  <input id="name" placeholder="Client Name">
  <input id="email" placeholder="Client Email">
  <input id="subject" placeholder="Subject">
  <textarea id="message" placeholder="Type your email..."></textarea>

  <button onclick="sendMail()">Generate Response</button>

  <div class="loader" id="loader">Processing...</div>
</div>

<div class="output-box" id="output">
Response will appear here...
</div>

</div>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwTJijz81CxBrY0_YrKH3dK5erasji0gHX6Kuo5rVFgS5u0lBMiNiV4AtGcdtSyUHCt/exec";

function go(page){
  window.location.href = page;
}

async function sendMail(){

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  if (!email || !message){
    alert("Email and message required");
    return;
  }

  document.getElementById("loader").style.display = "block";
  document.getElementById("output").innerText = "";

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name,
      email,
      subject,
      body: message
    })
  });

  const data = await res.json();

  document.getElementById("loader").style.display = "none";

  document.getElementById("output").innerText =
`Ticket ID: ${data.ticketId}

${data.reply}`;

}

</script>

</body>
</html>
