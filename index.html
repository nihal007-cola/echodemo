<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASE - Email Automation System Engine</title>

  <style>

    /* ===== GLOBAL ===== */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* ===== LEFT PANEL ===== */
    .left {
      width: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f172a, #020617);
      text-align: center;
      padding: 40px;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      background: linear-gradient(90deg, #3b82f6, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }

    /* ===== RIGHT PANEL ===== */
    .right {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 320px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid #1e293b;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      background: #020617;
      color: #e2e8f0;
    }

    input:focus {
      outline: 1px solid #3b82f6;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #3b82f6, #7c3aed);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .switch {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
        height: 50%;
      }

      .title {
        font-size: 28px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <!-- Replace logo.png later -->
    <img src="assets/logo.png" class="logo" />

    <div class="title">EASE</div>
    <div class="tagline">Email Automation System Engine</div>
    <div class="tagline">Powered by Offices of Nawnit Nihal</div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- LOGIN -->
    <div class="card" id="loginBox">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <button onclick="login()">Login</button>

      <div class="switch" onclick="showRegister()">
        Create Account
      </div>
    </div>

    <!-- REGISTER -->
    <div class="card" id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <button class="disabled">Register (Admin Only)</button>

      <div class="switch" onclick="showLogin()">
        Back to Login
      </div>
    </div>

  </div>

</div>

<script>

function showRegister(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";
}

function showLogin(){
  document.getElementById("registerBox").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    alert("Enter credentials");
    return;
  }

  // TEMP (backend later)
  alert("Login successful");

  // next screen
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
