<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Tickets</title>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.layout { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  border-right: 1px solid #1e293b;
  padding: 20px;
}

.sidebar h2 {
  color: #3b82f6;
  margin-bottom: 30px;
}

.nav-item {
  margin: 15px 0;
  color: #94a3b8;
  cursor: pointer;
}

.nav-item.active { color: white; }

/* ===== MAIN ===== */
.main { flex: 1; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { height: 28px; }

.brand-text { display: flex; flex-direction: column; }

.ease {
  font-size: 15px;
  font-weight: 600;
  color: #7c3aed;
}

.tagline {
  font-size: 11px;
  color: #94a3b8;
  white-space: nowrap;
}

/* RIGHT */
.header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-stats {
  text-align: right;
  font-size: 12px;
  color: #94a3b8;
}

.header-stats span {
  color: #3b82f6;
  font-weight: 600;
}

.user-badge {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(15,23,42,0.6);
  border: 1px solid #1e293b;
  font-size: 12px;
  color: #22c55e;
}

/* ===== NAV ===== */
.top-nav {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  padding: 8px;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(10px);
  border-radius: 10px;
}

.top-nav div {
  padding: 6px 12px;
  border-radius: 6px;
  color: #94a3b8;
  cursor: pointer;
}

.top-nav div.active {
  color: white;
  background: rgba(59,130,246,0.15);
}

/* ===== CONTENT ===== */
.grid {
  padding: 20px;
}

/* ===== TICKET CARD ===== */
.ticket-card {
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.ticket-title {
  font-size: 18px;
  font-weight: 600;
}

.meta {
  font-size: 13px;
  color: #94a3b8;
  margin: 6px 0;
}

.client {
  font-size: 13px;
  margin-bottom: 10px;
}

.client span { color: #3b82f6; }

.status.green { color: #22c55e; }
.status.yellow { color: #facc15; }
.status.red { color: #ef4444; }

.actions {
  margin-top: 10px;
}

.actions button {
  margin: 5px 5px 0 0;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-size: 12px;
}

.follow { background:#3b82f6; color:white; }
.custom { background:#7c3aed; color:white; }
.history { background:#0ea5e9; color:white; }
.print { background:#1e293b; color:white; }
.refresh { background:#f43f5e; color:white; }

@media (max-width: 768px) {
  .sidebar { display:none; }
  .layout { flex-direction: column; }
  .grid { padding: 12px; }
  .top-nav { overflow-x:auto; white-space:nowrap; }
}

/* 🔥 LOADER */
.loader-overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(2,6,23,0.6);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:1;
visibility:visible;
}

.loader-spinner{
width:50px;height:50px;
border:4px solid rgba(59,130,246,0.2);
border-top:4px solid #3b82f6;
border-radius:50%;
animation:spin 0.8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loaderOverlay" class="loader-overlay">
<div class="loader-spinner"></div>
</div>

<div class="layout">

<div class="sidebar">
  <h2>EASE</h2>
  <div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="nav-item active">Tickets</div>
  <div class="nav-item" onclick="go('reports.html')">Reports</div>
  <div class="nav-item" onclick="go('settings.html')">Settings</div>
</div>

<div class="main">

<div class="header">
  <div class="header-top">
    <div class="brand-wrap">
      <img src="assets/logo.png" class="logo">
      <div class="brand-text">
        <div class="ease">EASE</div>
        <div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
      </div>
    </div>

    <div class="header-right">
      <div class="header-stats">
        Open <span>12</span><br>
        Closed <span>5</span>
      </div>

      <div class="user-badge">Admin</div>
    </div>
  </div>

  <div class="top-nav">
    <div onclick="go('dashboard.html')">Dashboard</div>
    <div class="active">Tickets</div>
    <div onclick="go('reports.html')">Reports</div>
    <div onclick="go('settings.html')">Settings</div>
  </div>
</div>

<div class="grid" id="ticketContainer"></div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwTJijz81CxBrY0_YrKH3dK5erasji0gHX6Kuo5rVFgS5u0lBMiNiV4AtGcdtSyUHCt/exec";

function go(page){
  window.location.href = page;
}

/* 🔥 LOADER CONTROL */
function showLoader(){
  document.getElementById("loaderOverlay").style.display = "flex";
}

function hideLoader(){
  document.getElementById("loaderOverlay").style.display = "none";
}

/* LOAD TICKETS */
async function loadTickets(){

  showLoader();

  const res = await fetch(`${API}?type=tickets`);
  const data = await res.json();

  let html = "";

  data.forEach(t => {

    let statusClass = "green";
    if(t.Priority === "YELLOW") statusClass = "yellow";
    if(t.Priority === "RED") statusClass = "red";

    html += `
    <div class="ticket-card">
      <div class="ticket-title">${t.Ticket_ID}</div>
      <div class="meta">${t.Service || "-"} | ${t.Location || "-"}</div>

      <div class="client">
        Client: <span>${t.Name || "-"}</span><br>
        📧 ${t.Sender_Email || "-"}
      </div>

      <div class="status ${statusClass}">
        ${t.Status || "-"}
      </div>

      <div class="actions">
        <button class="follow">Follow-up</button>
        <button class="custom">Custom Mail</button>
        <button class="history">History</button>
        <button class="print">Print</button>
        <button class="refresh" onclick="loadTickets()">Refresh</button>
      </div>
    </div>
    `;
  });

  document.getElementById("ticketContainer").innerHTML = html;

  hideLoader();
}

loadTickets();

</script>

</body>
</html>
