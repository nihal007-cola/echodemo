<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EASE Reports</title>

<style>

/* ===== GLOBAL (UNCHANGED) ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: #e2e8f0;
}

.layout { display: flex; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  border-right: 1px solid #1e293b;
  padding: 20px;
}

.sidebar h2 { color: #3b82f6; }

.nav-item {
  margin: 15px 0;
  color: #94a3b8;
  cursor: pointer;
}

.nav-item.active { color: white; }

/* ===== MAIN ===== */
.main { flex: 1; }

/* ===== HEADER (UNCHANGED) ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #020617;
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo { height: 28px; }

.brand-text {
  display: flex;
  flex-direction: column;
}

.ease {
  font-size: 15px;
  font-weight: 600;
  color: #7c3aed;
}

.tagline {
  font-size: 11px;
  color: #94a3b8;
  white-space: nowrap;
}

/* RIGHT SIDE */
.header-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header-stats {
  text-align: right;
  font-size: 12px;
  color: #94a3b8;
}

.header-stats span {
  color: #3b82f6;
  font-weight: 600;
}

.user-badge {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid #1e293b;
  font-size: 12px;
  color: #22c55e;
}

/* ===== NAV ===== */
.top-nav {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  padding: 8px;
  border-radius: 10px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(10px);
}

.top-nav div {
  padding: 6px 12px;
  border-radius: 6px;
  color: #94a3b8;
  cursor: pointer;
}

.top-nav div.active {
  color: white;
  background: rgba(59,130,246,0.15);
}

/* ===== CONTENT ===== */
.grid {
  padding: 20px;
}

/* ===== MODULE CARDS ===== */
.module-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.module-card {
  background: rgba(15,23,42,0.7);
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* ===== TABLE ===== */
.table-container {
  margin-top: 20px;
  background: rgba(15,23,42,0.7);
  border-radius: 12px;
  border: 1px solid #1e293b;
  padding: 15px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
  font-size: 12px;
  text-align: left; /* 🔥 ONLY CHANGE */
}

th { color: #3b82f6; }

.print-btn {
  margin-top: 10px;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #3b82f6;
  color: white;
}

/* ================= MOBILE ONLY (UNCHANGED) ================= */
@media (max-width: 768px) {

  .sidebar { display: none; }

  .layout { flex-direction: column; }

  .grid { padding: 12px; }

  .top-nav {
    overflow-x: auto;
    white-space: nowrap;
  }

  .top-nav div {
    font-size: 12px;
    padding: 5px 10px;
  }

  .module-grid {
    grid-template-columns: 1fr;
  }

  .header { padding: 10px; }

  .logo { height: 22px; }

  .ease { font-size: 13px; }

  .tagline { font-size: 9px; }

  .header-stats { font-size: 10px; }

  .user-badge {
    font-size: 10px;
    padding: 4px 6px;
  }

}

</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>EASE</h2>
  <div class="nav-item" onclick="go('dashboard.html')">Dashboard</div>
  <div class="nav-item" onclick="go('tickets.html')">Tickets</div>
  <div class="nav-item active">Reports</div>
  <div class="nav-item" onclick="go('settings.html')">Settings</div>
</div>

<div class="main">

<div class="header">
  <div class="header-top">
    <div class="brand-wrap">
      <img src="assets/logo.png" class="logo">
      <div class="brand-text">
        <div class="ease">EASE</div>
        <div class="tagline">Powered by Offices of Nawnit&nbsp;Nihal</div>
      </div>
    </div>

    <div class="header-right">
      <div class="header-stats">
        Open <span>12</span><br>
        Closed <span>5</span>
      </div>
      <div class="user-badge">Admin</div>
    </div>
  </div>

  <div class="top-nav">
    <div onclick="go('dashboard.html')">Dashboard</div>
    <div onclick="go('tickets.html')">Tickets</div>
    <div class="active">Reports</div>
    <div onclick="go('settings.html')">Settings</div>
  </div>
</div>

<div class="grid">

  <div class="module-grid">
    <div class="module-card" onclick="loadTable('tickets')">TICKETS</div>
    <div class="module-card" onclick="loadTable('email')">EMAIL_LOG</div>
    <div class="module-card" onclick="loadTable('docs')">DOCUMENT_TRACKER</div>
    <div class="module-card" onclick="loadTable('keywords')">KEYWORD_ALERTS</div>
    <div class="module-card" onclick="loadTable('users')">USERS</div>
  </div>

  <div class="table-container" id="tableArea"></div>

</div>

</div>
</div>

<script>

const ROLE = "admin";

function loadTable(type){

  let headers = [];

  if(type === "tickets"){
    headers = ["Ticket_ID","Sender_Email","Name","Location","Service","Status","Substatus","Assigned_User","Priority","Last_Action_Time","Created_Date"];
  }

  if(type === "email"){
    headers = ["Ticket_ID","Direction","Email_Body","Timestamp","Detected_Intent"];
  }

  if(type === "docs"){
    headers = ["Ticket_ID","Required_Docs","Received_Docs","Missing_Docs","ReRequired_Reason","Status"];
  }

  if(type === "keywords"){
    headers = ["Keyword","Priority","Action"];
  }

  if(type === "users"){
    if(ROLE !== "admin"){
      alert("Access restricted");
      return;
    }
    headers = ["User_Name","Role","Location_Assigned","Type"];
  }

  render(headers);
}

function render(headers){

  let html = "<table><tr>";

  headers.forEach(h=> html += `<th>${h}</th>`);
  html += "</tr>";

  for(let i=0;i<5;i++){
    html += "<tr>";
    headers.forEach(()=> html += "<td>...</td>");
    html += "</tr>";
  }

  html += "</table>";
  html += `<button class="print-btn" onclick="window.print()">Print</button>`;

  document.getElementById("tableArea").innerHTML = html;
}

function go(page){
  window.location.href = page;
}

</script>

</body>
</html>
